<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Navbar -->
    <div class="flex justify-between p-4 bg-white shadow">
        <h1 class="text-xl font-bold">Github Issues</h1>
        <div class="flex gap-2">
            <input id="search-input" class="border p-1 rounded" placeholder="search-issue ">
            <button onclick="searchIssue()" class="bg-blus-500 text-white px-3 rounded">Search
                
            </button>
        </div>
    </div>

         <!--Issue info  -->
         <div class="max-w-6xl mx-auto mt-6 bvorder bg-white rounded-lg p-4 flex justify-between items-center">
         <div class="flex items-center gap-3">

            <div class="w-8 h-8 bg-purple-100 rounded-full flex items-center justify-center"> ⚙ </div>

              <div>
                <h2 class="font-bold">
                    <span id="issue-count">0</span>Issues
                </h2>

                <p class="text-sm text-gray-500">Track and manage your project issues</p>
              
            
            </div>
         </div>
        <div class="flex gap-4 text-sm">

      <span class="flex items-center gap-1">
     <span class="w-2 h-2 bg-green-500 rounded-full"></span>
      Open </span>

            <span class="flex items-center gap-1">
                <span class="w-2 h-2 bg-purple-500 rounded-full">
                    Closed
                </span>
            </span>

        </div>
         </div>



         <!-- Tabs -->

         <div class="max-w-6xl mx-auto flex gap-4 mt-6">
            <button onclick="filterIssues('all')" 
            class="bg-purple-600 text-white px-4 py-1 rounded">All
            </button>

            <button onclick="filterIssues('open')"
            class="bg-gray-200 px-4 py-1 rounded">Open
            </button>


            <button onclick="filterIssues('closed')"
            class="bg-gray-200 px-4 py-1 rounded">Closed
            </button>

         </div>


<!-- spinner -->
 <div id="spinner" class="text-center mt-6 hidden">
    lodding...
 </div>


 <!-- Issues container -->

 <div id="issues-container"
 class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mt-6">

 </div>

 <!-- model -->
  <div id="modal" class="inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-lg w-96">
        <h2 class="text-lg font-bold">Title</h2>
        <p class="mt-3 text-gray-600">This is modal description</p>
      <div class="mt-4 flex justify-end">
        <button onclick="closeModal()" class="bg-purple-600 text-white px-4 py-2 rounded">
      Close
        </button>

      </div>


    </div>

  </div>
         
 <script src="app.js"></script>
</body>
</html>
